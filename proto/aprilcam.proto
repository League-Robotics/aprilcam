syntax = "proto3";

package aprilcam;

// ---------------------------------------------------------------------------
// AprilCam gRPC service
// ---------------------------------------------------------------------------

service AprilCam {
  // Camera lifecycle
  rpc ListCameras       (Empty)               returns (ListCamerasResponse);
  rpc OpenCamera        (OpenCameraRequest)   returns (OpenCameraResponse);
  rpc CloseCamera       (CameraRequest)       returns (Empty);
  rpc ReloadCalibration (CameraRequest)       returns (Empty);
  rpc Shutdown          (Empty)               returns (Empty);

  // One-shot queries (no streaming required)
  rpc GetCameraInfo     (CameraRequest)       returns (CameraInfoResponse);
  rpc CaptureFrame      (CameraRequest)       returns (CaptureFrameResponse);
  rpc GetTags           (CameraRequest)       returns (TagFrameResponse);

  // Natural-language playfield feature lookup ("where is the blue dot")
  rpc WhereIs           (WhereRequest)        returns (WhereResponse);

  // Stream discovery — allocates a socket/port pair on demand
  rpc GetImageStream    (StreamRequest)       returns (StreamEndpoint);
  rpc GetTagStream      (StreamRequest)       returns (StreamEndpoint);

  // Live overlay injection — push overlay elements to all tag stream subscribers
  rpc PublishOverlay    (PublishOverlayRequest) returns (StatusReply);
}

// ---------------------------------------------------------------------------
// Generic / shared messages
// ---------------------------------------------------------------------------

message Empty {}

// ---------------------------------------------------------------------------
// Camera lifecycle messages
// ---------------------------------------------------------------------------

message ListCamerasResponse {
  repeated string cameras = 1;
}

message OpenCameraRequest {
  int32 index = 1;
}

message OpenCameraResponse {
  string cam_name   = 1;
  string camera_dir = 2;   // absolute path to daemon's per-camera data directory
}

message CameraRequest {
  string cam_name = 1;
}

// ---------------------------------------------------------------------------
// One-shot query messages
// ---------------------------------------------------------------------------

message CameraInfoResponse {
  string cam_name   = 1;
  bool   calibrated = 2;
  int32  frame_w    = 3;
  int32  frame_h    = 4;
  float  fps        = 5;
}

message CaptureFrameResponse {
  bytes jpeg = 1;
}

// TagMsg — a single detected tag in a frame.
message TagMsg {
  int32  id           = 1;
  float  cx_px        = 2;   // pixel center X
  float  cy_px        = 3;   // pixel center Y
  repeated float corners_px = 4;  // 8 floats: x0,y0, x1,y1, x2,y2, x3,y3
  float  yaw          = 5;   // orientation, radians
  float  wx           = 6;   // world X (cm); 0 = uncalibrated
  float  wy           = 7;   // world Y (cm); 0 = uncalibrated
  bool   in_playfield = 8;
  float  vx_px        = 9;   // pixel velocity X
  float  vy_px        = 10;  // pixel velocity Y
  float  speed_px     = 11;  // pixel speed
  float  vx_world     = 12;  // world velocity X
  float  vy_world     = 13;  // world velocity Y
  float  speed_world  = 14;  // world speed
  float  heading_rad  = 15;
  float  age          = 16;  // seconds since last detected (0 = this frame)
}

message TagFrameResponse {
  uint64         frame_id          = 1;
  repeated TagMsg tags             = 2;
  // 9 floats, row-major 3x3 homography matrix; empty = uncalibrated
  repeated float homography        = 3;
  // 8 floats: x0,y0, x1,y1, x2,y2, x3,y3 (UL/UR/LR/LL)
  repeated float playfield_corners = 4;
  float          field_width_cm    = 5;
  float          field_height_cm   = 6;
  // A1-centred origin (cm) applied to tag world_xy. Consumers invert the
  // transform with: H_world = (wx + origin_x, origin_y - wy). Prefers the
  // AprilTag-1 world position; falls back to the field half-dimensions.
  float          origin_x          = 7;
  float          origin_y          = 8;
}

// ---------------------------------------------------------------------------
// Natural-language "where is X" lookup messages
// ---------------------------------------------------------------------------

message WhereRequest {
  string query    = 1;  // natural-language question, e.g. "where is the blue dot"
  string cam_name = 2;  // optional; when set, live detections for that camera
                        // are merged into matched tag features
}

// WhereMatch — one playfield feature that matched the query.
message WhereMatch {
  string slug         = 1;
  string type         = 2;  // "april_tag" | "aruco_tag" | "rectangle" | "dot"
  string category     = 3;  // source list in playfield.json
  bool   has_location = 4;
  float  x            = 5;   // static world X (cm, A1-centred)
  float  y            = 6;   // static world Y (cm, A1-centred)
  string record_json  = 7;   // full feature record from playfield.json, as JSON
  // Live detection (present only when cam_name was given and the tag id is
  // currently detected):
  bool   has_live     = 8;
  float  live_x       = 9;   // live detected world X (cm)
  float  live_y       = 10;  // live detected world Y (cm)
  bool   in_playfield = 11;
}

message WhereResponse {
  string status                = 1;  // "ok" | "ambiguous" | "not_found"
  repeated WhereMatch matches  = 2;
  // Populated only when status == "not_found": the full playfield.json text,
  // so the caller can hand it to an LLM to resolve the reference.
  string playfield_json        = 3;
  repeated string tokens       = 4;  // normalised search tokens (for debugging)
}

// ---------------------------------------------------------------------------
// Stream discovery messages
// ---------------------------------------------------------------------------

message StreamRequest {
  string cam_name = 1;
  uint32 max_hz   = 2;  // 0 = use default (20); client asks for its preferred cap
}

message StreamEndpoint {
  string socket_path = 1;  // non-empty when using Unix sockets
  uint32 tcp_port    = 2;  // non-zero when using TCP
}

// ---------------------------------------------------------------------------
// Binary stream wire messages (length-prefixed, sent over stream sockets)
// These are NOT used as gRPC responses but are included here so all message
// types live in one place and can be imported from a single generated module.
// ---------------------------------------------------------------------------

// TagFrame — published on the tag stream socket for every detected change
// or at the heartbeat interval (1 s).
message TagFrame {
  uint64          frame_id          = 1;
  uint64          ts_mono_ns        = 2;
  uint64          ts_wall_ms        = 3;
  repeated TagMsg tags              = 4;
  // 9 floats, row-major 3x3 homography; empty = uncalibrated
  repeated float  homography        = 5;
  // 8 floats: x0,y0, x1,y1, x2,y2, x3,y3 (UL/UR/LR/LL)
  repeated float  playfield_corners = 6;
  float           fps               = 7;
  // Playfield dimensions in cm (0 = unknown); used to convert world_xy to A1-centred
  float           field_width_cm    = 8;
  float           field_height_cm   = 9;
  // A1-centred origin (cm) applied to tag world_xy. Consumers invert the
  // transform with: H_world = (wx + origin_x, origin_y - wy). Prefers the
  // AprilTag-1 world position; falls back to the field half-dimensions.
  float           origin_x          = 10;
  float           origin_y          = 11;
}

// ImageFrame — published on the image stream socket for every camera frame.
message ImageFrame {
  uint64 frame_id    = 1;  // matches the TagFrame captured at the same instant
  uint64 ts_mono_ns  = 2;
  bytes  jpeg        = 3;
  int32  width       = 4;
  int32  height      = 5;
}

// ---------------------------------------------------------------------------
// Overlay messages (multiplexed on the tag stream socket)
// ---------------------------------------------------------------------------

// OverlayElement — one drawable shape in world-coordinate space (cm).
// type values: "arc", "arrow", "point", "polyline", "text", "rect", "polygon"
// arc:      params = [cx, cy, radius, start_deg, end_deg]
// arrow:    params = [x1, y1, x2, y2]
// point:    params = [x, y, radius_cm]
// polyline: params = [x0, y0, x1, y1, ...]
// text:     params = [x, y] or [x, y, font_scale]; content in text field
// rect:     params = [x1, y1, x2, y2]
// polygon:  params = [x0, y0, x1, y1, ...]; closed; thickness=-1 fills
message OverlayElement {
  string         type      = 1;
  repeated float params    = 2;
  repeated int32 color     = 3;  // [R, G, B] 0-255
  int32          thickness = 4;  // -1 = filled
  string         text      = 5;  // content for "text" type elements
}

// OverlayFrame — a set of overlay elements pushed to the tag stream.
// The view drops this frame if (now - timestamp) > ttl.
message OverlayFrame {
  double                  timestamp = 1;
  float                   ttl       = 2;
  repeated OverlayElement elements  = 3;
  string                  camera_id = 4;
}

// StreamMessage — oneof wrapper multiplexing TagFrame and OverlayFrame
// on the same length-prefixed binary stream socket.
message StreamMessage {
  oneof payload {
    TagFrame     tag_frame = 1;
    OverlayFrame overlay   = 2;
  }
}

// ---------------------------------------------------------------------------
// PublishOverlay RPC messages
// ---------------------------------------------------------------------------

message PublishOverlayRequest {
  string       cam_name = 1;
  OverlayFrame overlay  = 2;
}

message StatusReply {
  bool   ok    = 1;
  string error = 2;
}
